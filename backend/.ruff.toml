target-version = "py312"
line-length = 88
exclude = ["migrations/", ".venv/"]

[lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "N", "SIM", "TCH"]
ignore = [
    "B008",   # FastAPI Depends() in default args
    "E501",
    "F821",   # allow undefined for circular import purpose
    "TCH",    # TYPE_CHECKING blocks break FastAPI Depends() and runtime protocols
    "UP037",  # allows quotes from type annotation
    "UP042",  # scaffold uses str+Enum pattern intentionally
    "N818",   # DomainException is the intentional base class name
    "N802",   # Function name can be UPPERCASE (e.g., setting class)
]

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"
