services:
  postgres:
    image: postgres:16-alpine
    container_name: bukoo_postgres
    restart: unless-stopped
    env_file:
      - ./.env.dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bukoo}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: ${PGDATA:-/var/lib/postgresql/data/pgdata}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bukoo_pgadmin
    restart: unless-stopped
    env_file:
      - ./.env.dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-postgres@gmail.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-postgres}
      PGADMIN_CONFIG_SERVER_MODE: ${PGADMIN_CONFIG_SERVER_MODE:-false}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: ${PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED:-false}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  mailpit:
    image: axllent/mailpit:latest
    container_name: bukoo_mailpit
    restart: unless-stopped
    env_file:
      - ./.env.dev
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: true
      MP_SMTP_AUTH_ALLOW_INSECURE: true

  minio:
    image: minio/minio:latest
    container_name: bukoo_minio
    restart: unless-stopped
    env_file:
      - ./.env.dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: bukoo_minio_init
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ./.env.dev
    volumes:
      - ./scripts/minio/init-bucket.sh:/init-bucket.sh
    entrypoint: ["/bin/sh", "/init-bucket.sh"]

  redis:
    image: redis:7-alpine
    container_name: bukoo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  flower:
    image: mher/flower:latest
    container_name: bukoo_flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    env_file:
      - ./.env.dev
    environment:
      CELERY_BROKER_URL: ${BROKER_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    container_name: bukoo_redisinsight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data

volumes:
  postgres_data:
  pgadmin_data:
  minio_data:
  redisinsight_data:
